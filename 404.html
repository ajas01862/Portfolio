<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    min-height: 100vh;
    padding: 40px 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 40px;
    font-size: 18px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 16px;
    transition: 0.3s;
    border: 1px solid #334155;
}

.card:hover {
    transform: translateY(-4px);
    border-color: #3b82f6;
}

.card h2 {
    margin-bottom: 10px;
    font-size: 20px;
}

.card p {
    color: #cbd5e1;
    margin-bottom: 15px;
    font-size: 14px;
}

.card a {
    text-decoration: none;
    color: white;
    background: #2563eb;
    padding: 10px 16px;
    border-radius: 10px;
    display: inline-block;
}

.loader {
    color: #94a3b8;
    font-size: 18px;
}

.home-btn {
    display: inline-block;
    margin-top: 20px;
    margin-bottom: 40px;
    text-decoration: none;
    color: white;
    background: #16a34a;
    padding: 12px 18px;
    border-radius: 10px;
}
</style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <p class="subtitle">
        The page you are looking for does not exist.
        Here are my available projects instead.
    </p>

    <a class="home-btn" href="/">Go Home</a>

    <div id="repos" class="grid">
        <div class="loader">Loading projects...</div>
    </div>
</div>

<script>
const username = 'ajas01862';

async function loadRepos() {
    const container = document.getElementById('repos');

    try {
        const response = await fetch(`https://api.github.com/users/${username}/repos?per_page=100`);
        const repos = await response.json();

        container.innerHTML = '';

        const pageRepos = repos.filter(repo => repo.has_pages);

        if (pageRepos.length === 0) {
            container.innerHTML = '<p>No GitHub Pages repositories found.</p>';
            return;
        }

        pageRepos.forEach(repo => {
            const card = document.createElement('div');
            card.className = 'card';

            let url = '';

            if (repo.name.toLowerCase() === `${username}.github.io`) {
                url = `https://${username}.github.io/`;
            } else {
                url = `https://${username}.github.io/${repo.name}/`;
            }

            card.innerHTML = `
                <h2>${repo.name}</h2>
                <p>${repo.description || 'No description available.'}</p>
                <a href="${url}">Open Project</a>
            `;

            container.appendChild(card);
        });

    } catch (error) {
        console.error(error);
        container.innerHTML = '<p>Failed to load repositories.</p>';
    }
}

loadRepos();
</script>

</body>
</html>
